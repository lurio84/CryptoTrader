name: Crypto Signal Check

on:
  schedule:
    # Every 4 hours: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    - cron: '0 */4 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  check-signals:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Restore alert DB cache
        uses: actions/cache@v4
        with:
          path: data/cryptotrader.db
          key: cryptotrader-db-${{ github.run_id }}
          restore-keys: cryptotrader-db

      - name: Install dependencies
        run: pip install -e ".[all]"

      - name: Run signal check and notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py check --notify
